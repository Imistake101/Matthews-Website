<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matthew's Website</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="terminal" role="main" aria-label="Interactive terminal bio site">
    <div id="output" aria-live="polite" aria-atomic="false"></div>
    <div id="input-line" class="line" style="display:none;">
      <span class="prompt" aria-hidden="true">visitor@bio:~$</span>
      <input id="cmdline" type="text" autocomplete="off" spellcheck="false" autofocus aria-label="Terminal command input" />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
